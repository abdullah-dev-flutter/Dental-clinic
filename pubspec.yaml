name: dental_clinic
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1
  supabase_flutter: ^2.14.2
  image_picker: ^1.2.2
  riverpod: ^2.6.1
  collection: ^1.19.1
  geolocator: ^14.0.2
  geocoding: ^2.2.1
  http: ^1.2.1
  url_launcher: ^6.3.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  dio: ^5.9.2
  flutter_map_marker_cluster: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.9.5
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1C1C2E"
  image: "assets/icons/Splash.png"
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
